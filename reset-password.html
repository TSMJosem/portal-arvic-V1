<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal ARVIC - Restablecer Contraseña</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/shared.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="login-container">
        <div class="logo-section">
            <div class="logo">
                <img src="images/Logo Grupo IT Arvic 2.svg" alt="GRUPO IT ARVIC" class="logo-svg-complete">
            </div>
            <p class="welcome-text">Restablecer Contraseña</p>
        </div>

        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>

        <!-- Formulario de nueva contraseña -->
        <form id="resetPasswordForm">
            <div class="form-group">
                <label for="newPassword">
                    <i class="fas fa-lock"></i> Nueva Contraseña
                </label>
                <div class="password-input-wrapper">
                    <input type="password" id="newPassword" placeholder="Ingrese su nueva contraseña" required minlength="6">
                    <button type="button" class="toggle-password-btn" onclick="togglePasswordVisibility('newPassword', this)">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">
                    <i class="fas fa-lock"></i> Confirmar Contraseña
                </label>
                <div class="password-input-wrapper">
                    <input type="password" id="confirmPassword" placeholder="Confirme su nueva contraseña" required minlength="6">
                    <button type="button" class="toggle-password-btn" onclick="togglePasswordVisibility('confirmPassword', this)">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <!-- Password strength indicator -->
            <div class="password-strength" id="passwordStrength">
                <div class="strength-bar">
                    <div class="strength-fill" id="strengthFill"></div>
                </div>
                <span class="strength-text" id="strengthText"></span>
            </div>

            <button type="submit" class="login-btn" id="resetBtn">
                <i class="fas fa-key"></i> Restablecer Contraseña
            </button>
        </form>

        <!-- Token inválido/expirado -->
        <div id="tokenErrorView" style="display: none;">
            <div class="token-error-icon">
                <i class="fas fa-exclamation-triangle"></i>
            </div>
            <p class="token-error-text">El enlace de restablecimiento es inválido o ha expirado.</p>
            <a href="/" class="back-to-login-link">
                <i class="fas fa-arrow-left"></i> Volver al inicio de sesión
            </a>
        </div>

        <!-- Éxito -->
        <div id="successView" style="display: none;">
            <div class="success-icon-large">
                <i class="fas fa-check-circle"></i>
            </div>
            <p class="success-text-large">¡Contraseña restablecida exitosamente!</p>
            <p class="success-subtext">Ya puedes iniciar sesión con tu nueva contraseña.</p>
            <a href="/" class="back-to-login-link login-btn" style="display: inline-block; text-decoration: none; text-align: center;">
                <i class="fas fa-sign-in-alt"></i> Ir al Login
            </a>
        </div>

        <div class="forgot-password-section" style="margin-top: 16px;">
            <a href="/" class="forgot-password-link">
                <i class="fas fa-arrow-left"></i> Volver al inicio de sesión
            </a>
        </div>
    </div>

    <script src="js/reset-password.js"></script>
</body>
</html>
