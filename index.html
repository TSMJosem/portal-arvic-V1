<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal ARVIC - Iniciar Sesión</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/shared.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="login-container">
        <div class="logo-section">
            <div class="logo">
                <img src="images/Logo Grupo IT Arvic 2.svg" alt="GRUPO IT ARVIC" class="logo-svg-complete">
            </div>
            <p class="welcome-text">Bienvenido al Portal de Gestión</p>
        </div>

        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>

        <form id="loginForm">

            <div class="form-group">
                <label for="userId">Usuario / ID</label>
                <input type="text" id="userId" placeholder="Ingrese su usuario o ID" required>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="Ingrese su contraseña" required>
            </div>

            <button type="submit" class="login-btn">Iniciar Sesión</button>
        </form>

        <!-- Enlace de recuperación de contraseña -->
        <div class="forgot-password-section" id="forgotPasswordSection">
            <a href="#" class="forgot-password-link" id="forgotPasswordLink">
                <i class="fas fa-lock"></i> ¿Olvidaste tu contraseña?
            </a>
        </div>

        <!-- Formulario de recuperación (oculto por defecto) -->
        <div class="forgot-password-form" id="forgotPasswordForm" style="display: none;">
            <div class="forgot-form-header">
                <h3><i class="fas fa-envelope"></i> Recuperar Contraseña</h3>
                <p>Ingresa tu correo electrónico registrado y te enviaremos un enlace para restablecer tu contraseña.</p>
            </div>
            
            <div class="form-group">
                <label for="recoveryEmail">Correo Electrónico</label>
                <input type="email" id="recoveryEmail" placeholder="ejemplo@correo.com" required>
            </div>

            <button type="button" class="login-btn recovery-btn" id="sendRecoveryBtn">
                <i class="fas fa-paper-plane"></i> Enviar Enlace de Recuperación
            </button>
            
            <a href="#" class="back-to-login-link" id="backToLoginLink">
                <i class="fas fa-arrow-left"></i> Volver al inicio de sesión
            </a>
        </div>
    </div>

    <script src="js/databaseMongoDB.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
